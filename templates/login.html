{% extends "base.html" %}

{% block content %}
<style>
    /* Zostawiamy tylko style specyficzne dla logowania */
    .login-container {
        margin-top: 50px;
        max-width: 400px;
    }

    .card {
        border-radius: 15px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .btn-primary {
        background-color: #004a99;
        border: none;
    }
</style>

<div class="container d-flex justify-content-center">
    <div class="login-container w-100">
        <div class="card p-4">
            <div class="text-center mb-4">
                <h4>System Obsługi Praktyk</h4>
                <p class="text-muted">ANS w Elblągu [cite: 2]</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email uczelniany</label>
                    <input type="email" name="email" class="form-control" placeholder="nr_albumu@student.ans.elblag.pl"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Hasło</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Zaloguj się</button>
            </form>

            <div class="mt-3 text-center">
                <small><a href="{{ url_for('auth.reset_hasla') }}" class="text-muted">Zapomniałeś hasła? [cite:
                        197]</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
